<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Stonni Atacado</title>
<style>
/* ── reset / base ───────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0f172a;color:#e2e8f0;font-family:Inter,system-ui,sans-serif;font-size:14px}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
input,select,textarea{font:inherit;color:#e2e8f0;background:#1e293b;border:1px solid #334155;border-radius:6px;padding:8px 12px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:#3b82f6}
textarea{resize:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#1e293b}
::-webkit-scrollbar-thumb{background:#475569;border-radius:2px}

/* ── login ──────────────────────────────────────── */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.login-box{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:32px;width:100%;max-width:360px;box-shadow:0 25px 50px rgba(0,0,0,.5)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo .emoji{font-size:48px;display:block;margin-bottom:8px}
.login-logo h1{font-size:18px;font-weight:700;color:#f1f5f9}
.login-logo p{font-size:12px;color:#64748b;margin-top:4px}
.login-field{margin-bottom:14px}
.login-field label{display:block;font-size:11px;color:#94a3b8;margin-bottom:4px}
.btn-primary{width:100%;background:#2563eb;color:#fff;font-weight:600;padding:10px;border-radius:8px;font-size:14px;transition:background .2s}
.btn-primary:hover{background:#1d4ed8}
.btn-primary:disabled{opacity:.6;cursor:default}
.login-error{display:none;font-size:11px;color:#f87171;background:#7f1d1d22;border:1px solid #f8717133;border-radius:6px;padding:8px 10px;margin-top:10px}
.login-footer{text-align:center;font-size:11px;color:#475569;margin-top:20px}
.login-footer a:hover{color:#94a3b8}

/* ── app shell ──────────────────────────────────── */
#app-screen{display:none;height:100vh;flex-direction:column}
#app-screen.visible{display:flex}

/* topbar */
.topbar{height:56px;background:#0f172a;border-bottom:1px solid #1e293b;display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;z-index:20;position:sticky;top:0}
.topbar-logo{font-size:20px}
.topbar-title{font-size:14px;font-weight:700;color:#f1f5f9}
.topbar-period{margin-left:16px}
.topbar-period select{background:#1e293b;border:1px solid #334155;color:#cbd5e1;font-size:11px;padding:6px 10px;border-radius:6px;width:auto}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.topbar-user{font-size:11px;color:#64748b}
.topbar-link{font-size:11px;color:#64748b;transition:color .2s}
.topbar-link:hover{color:#94a3b8}
.btn-logout{font-size:11px;color:#64748b;border:1px solid #334155;padding:4px 10px;border-radius:6px;transition:all .2s}
.btn-logout:hover{color:#94a3b8;border-color:#475569}

/* layout principal */
.app-body{flex:1;display:flex;overflow:hidden}

/* sidebar */
.sidebar{width:220px;background:#0f172a;border-right:1px solid #1e293b;display:flex;flex-direction:column;flex-shrink:0;padding:12px 0}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 18px;font-size:13px;color:#64748b;transition:all .2s;border-left:3px solid transparent;cursor:pointer}
.sidebar-item:hover{background:#1e293b;color:#cbd5e1}
.sidebar-item.active{background:#1e293b;color:#f1f5f9;border-left-color:#3b82f6}
.sidebar-item .icon{font-size:16px;width:20px;text-align:center}
.sidebar-label{font-size:13px}
.sidebar-badge{margin-left:auto;background:#ef4444;color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:1px 6px}

/* páginas */
.page{display:none;flex:1;overflow:hidden;flex-direction:column}
.page.active{display:flex}
.page-scroll{flex:1;overflow-y:auto;padding:20px}

/* ── cards KPI ──────────────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.kpi-card{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:16px}
.kpi-label{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.kpi-value{font-size:20px;font-weight:700;color:#f1f5f9}
.kpi-blue .kpi-value{color:#60a5fa}
.kpi-green .kpi-value{color:#34d399}
.kpi-purple .kpi-value{color:#a78bfa}
.kpi-yellow .kpi-value{color:#fbbf24}

/* canal cards */
.canal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
@media(max-width:600px){.canal-grid{grid-template-columns:1fr}}
.canal-card{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:16px}
.canal-title{font-size:11px;color:#64748b;margin-bottom:6px}
.canal-value{font-size:22px;font-weight:700;color:#f1f5f9}
.canal-sub{font-size:11px;color:#475569;margin-top:4px}

/* seção card */
.section-card{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:16px;margin-bottom:16px}
.section-title{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}

/* tabelas */
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;color:#64748b;padding-bottom:8px;border-bottom:1px solid #334155;font-weight:500}
th.r,td.r{text-align:right}
td{padding:10px 0;border-bottom:1px solid #1e293b22;font-size:13px;color:#cbd5e1}
tr:last-child td{border-bottom:none}
tr.clickable:hover{background:#ffffff08;cursor:pointer}

/* barra de progresso */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-label{font-size:11px;color:#64748b;width:60px;flex-shrink:0}
.bar-track{flex:1;background:#334155;border-radius:4px;height:6px}
.bar-fill{height:6px;border-radius:4px;background:#3b82f6}
.bar-value{font-size:11px;color:#94a3b8;width:60px;text-align:right;flex-shrink:0}

/* badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;border:1px solid;font-size:10px;font-weight:500}
.badge-ativo{background:#05200e;border-color:#166534;color:#4ade80}
.badge-atencao{background:#1c1208;border-color:#854d0e;color:#fbbf24}
.badge-risco{background:#1c0808;border-color:#991b1b;color:#f87171}
.badge-prosp{background:#0f172a;border-color:#334155;color:#94a3b8}
.badge-tipo-obs{background:#1e3a5f;color:#93c5fd;border:none;font-size:10px;padding:2px 6px;border-radius:999px}
.badge-tipo-tar{background:#2d1f00;color:#fbbf24;border:none;font-size:10px;padding:2px 6px;border-radius:999px}
.badge-tipo-fol{background:#1e1040;color:#c084fc;border:none;font-size:10px;padding:2px 6px;border-radius:999px}
.badge-tipo-lig{background:#052e16;color:#4ade80;border:none;font-size:10px;padding:2px 6px;border-radius:999px}

/* ── CRM layout ──────────────────────────────────── */
.crm-body{display:flex;flex:1;overflow:hidden}

/* lista */
.crm-list-panel{display:flex;flex-direction:column;border-right:1px solid #334155;overflow:hidden;flex-shrink:0;background:#0f172a}
@media(min-width:1024px){.crm-list-panel{width:420px}}
@media(min-width:768px) and (max-width:1023px){.crm-list-panel{width:340px}}
@media(max-width:767px){.crm-list-panel{width:100%}}

.crm-controls{padding:12px;border-bottom:1px solid #1e293b;display:flex;flex-direction:column;gap:8px}
.search-box{position:relative}
.search-box .icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#475569;font-size:14px}
.search-box input{padding-left:32px;font-size:13px}

.tabs-row{display:flex;gap:4px}
.tab-btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;transition:all .2s;color:#64748b}
.tab-btn:hover{background:#1e293b;color:#cbd5e1}
.tab-btn.on{background:#2563eb;color:#fff}

.filter-row{display:flex;gap:4px;flex-wrap:wrap}
.filter-btn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;transition:all .2s;color:#64748b}
.filter-btn:hover{color:#cbd5e1}
.filter-btn.on{background:#1e3a5f;color:#60a5fa}

.crm-list{flex:1;overflow-y:auto}
.cli-card{width:100%;text-align:left;padding:12px 16px;border-bottom:1px solid #1e293b;transition:background .15s;display:block}
.cli-card:hover{background:#1e293b}
.cli-card.selected{background:#1e293b;border-left:3px solid #3b82f6}
.cli-name{font-size:13px;font-weight:600;color:#f1f5f9;display:flex;align-items:center;gap:6px;min-width:0}
.cli-name span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cli-sub{font-size:11px;color:#64748b;margin-top:2px}
.cli-meta{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.cli-meta-left{font-size:11px;color:#475569;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.cli-meta-right{font-size:10px;color:#334155;font-family:monospace;flex-shrink:0;margin-left:8px}

/* drawer */
.crm-detail-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.drawer-placeholder{flex:1;display:flex;align-items:center;justify-content:center;color:#334155}
.drawer-placeholder .inner{text-align:center}
.drawer-placeholder .big{font-size:40px;opacity:.3;margin-bottom:8px}

#crm-drawer{position:absolute;inset:0;background:#0f172a;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;z-index:10;overflow:hidden}
#crm-drawer.open{transform:translateX(0)}
.drawer-head{display:flex;align-items:center;gap:10px;padding:12px 20px;border-bottom:1px solid #1e293b;flex-shrink:0}
.drawer-back{font-size:18px;color:#64748b;transition:color .2s;padding:0 4px}
.drawer-back:hover{color:#f1f5f9}
.drawer-headtitle{font-size:14px;font-weight:600;color:#f1f5f9;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-wa{background:#16a34a;color:#fff;font-size:11px;font-weight:600;padding:6px 12px;border-radius:6px;transition:background .2s;display:none}
.btn-wa:hover{background:#15803d}
.drawer-body{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:20px}

/* drawer sections */
.d-title{font-size:16px;font-weight:700;color:#f1f5f9;line-height:1.3}
.d-meta{font-size:12px;color:#64748b;margin-top:4px}
.d-vendor{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:12px;color:#94a3b8}
.d-vendor strong{color:#e2e8f0}

.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.kpi-mini{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:10px;text-align:center}
.kpi-mini .label{font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.kpi-mini .val{font-size:14px;font-weight:700;color:#f1f5f9}

.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.section-head h4{font-size:10px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.06em}
.link-sm{font-size:11px;color:#3b82f6;transition:color .2s}
.link-sm:hover{color:#60a5fa}

.phone-row{display:flex;align-items:center;justify-content:space-between;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:8px 12px;margin-bottom:6px;gap:8px}
.phone-info{display:flex;align-items:center;gap:8px;min-width:0;flex:1}
.phone-num{font-family:monospace;font-size:13px;color:#e2e8f0}
.phone-name{font-size:11px;color:#64748b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.phone-principal{font-size:9px;background:#1e3a5f;color:#60a5fa;border-radius:4px;padding:1px 6px;flex-shrink:0}
.phone-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
.btn-wa-sm{font-size:16px;color:#4ade80;transition:color .2s;line-height:1}
.btn-wa-sm:hover{color:#86efac}
.btn-del{font-size:11px;color:#334155;transition:color .2s;padding:2px 4px}
.btn-del:hover{color:#f87171}

.phone-form{display:none;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:12px;margin-bottom:8px;gap:8px;flex-direction:column}
.phone-form.open{display:flex}

.nota-card{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:12px;margin-bottom:8px}
.nota-card.done{opacity:.5}
.nota-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:8px}
.nota-meta{font-size:10px;color:#475569}
.nota-text{font-size:13px;color:#cbd5e1;line-height:1.5}
.nota-date{font-size:10px;color:#475569;margin-top:4px}
.btn-resolve{font-size:11px;color:#4ade80;transition:color .2s}
.btn-resolve:hover{color:#86efac}

.new-note-box{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:16px;display:flex;flex-direction:column;gap:10px}
.new-note-box h4{font-size:10px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.06em}
.row-2{display:flex;gap:8px}
.row-2>*{flex:1}
.btn-save{background:#2563eb;color:#fff;font-size:13px;font-weight:600;padding:10px;border-radius:8px;transition:background .2s;width:100%}
.btn-save:hover{background:#1d4ed8}

/* today / umbler panels */
.today-panel{background:#0c1928;border:1px solid #1e3a5f;border-radius:8px;padding:12px;margin-bottom:8px}
.today-title{font-size:11px;font-weight:700;color:#60a5fa;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.today-item{display:flex;align-items:center;justify-content:space-between;background:#0f172a;border-radius:6px;padding:7px 10px;margin-bottom:4px;gap:8px}
.today-item:last-child{margin-bottom:0}
.today-left{display:flex;align-items:center;gap:6px;min-width:0;flex:1}
.today-nome{font-size:12px;font-weight:600;color:#f1f5f9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.umbler-panel{background:#1c0808;border:1px solid #7f1d1d44;border-radius:8px;margin-bottom:8px;overflow:hidden}
.umbler-toggle{width:100%;display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;transition:background .2s}
.umbler-toggle:hover{background:#ffffff08}
.umbler-title{font-size:12px;font-weight:700;color:#f87171;flex:1}
.umbler-badge{background:#ef4444;color:#fff;font-size:10px;font-weight:700;border-radius:999px;padding:1px 7px}
.umbler-list{padding:0 12px 12px}
.umbler-item{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px;margin-bottom:6px}
.umbler-item:last-child{margin-bottom:0}
.umbler-nome{font-size:13px;font-weight:600;color:#f1f5f9}
.umbler-info{font-size:11px;color:#64748b;margin-top:2px;display:flex;gap:10px;flex-wrap:wrap}
.umbler-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.btn-vinc{font-size:11px;padding:5px 10px;border:1px solid #334155;border-radius:6px;color:#94a3b8;transition:all .2s}
.btn-vinc:hover{background:#1e293b;color:#f1f5f9}
.btn-nc{font-size:11px;padding:5px 8px;color:#f87171;transition:color .2s}
.btn-nc:hover{color:#fca5a5}

/* vendedor expand */
.expand-content{background:#080f1a;border-top:1px solid #1e293b;padding:16px}
.health-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.health-box{border-radius:6px;padding:10px;text-align:center}
.health-box .n{font-size:18px;font-weight:700}
.health-box .l{font-size:10px;margin-top:2px}
.hg-ativo{background:#05200e;color:#4ade80}
.hg-atencao{background:#1c1208;color:#fbbf24}
.hg-risco{background:#1c0808;color:#f87171}

/* modal */
.modal-overlay{display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal-box{background:#1e293b;border:1px solid #334155;border-radius:12px;width:100%;max-width:440px;box-shadow:0 25px 50px rgba(0,0,0,.6)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #334155}
.modal-head h3{font-size:14px;font-weight:700;color:#f1f5f9}
.btn-close{font-size:18px;color:#64748b;transition:color .2s;line-height:1}
.btn-close:hover{color:#f1f5f9}
.modal-body{padding:16px 20px}
.modal-results{max-height:280px;overflow-y:auto;margin-top:12px}
.modal-result-btn{width:100%;text-align:left;padding:10px;border-radius:6px;transition:background .15s;border-bottom:1px solid #1e293b;display:block}
.modal-result-btn:hover{background:#334155}
.modal-result-name{font-size:13px;font-weight:500;color:#e2e8f0}
.modal-result-meta{font-size:11px;color:#64748b;margin-top:2px}

/* utils */
.hidden{display:none}
.spin{animation:spin 1s linear infinite;display:inline-block}
.empty{text-align:center;padding:32px;color:#475569;font-size:13px}
.warn{color:#f59e0b;font-size:12px}
</style>
</head>
<body>

<!-- ══════════ LOGIN ══════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <span class="emoji">❄️</span>
      <h1>Stonni Atacado</h1>
      <p>Dashboard & CRM de Distribuição</p>
    </div>
    <div class="login-field">
      <label>E-mail</label>
      <input id="login-email" type="email" placeholder="seu@email.com" autocomplete="email"/>
    </div>
    <div class="login-field">
      <label>Senha</label>
      <input id="login-senha" type="password" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div id="login-error" class="login-error"></div>
    <button id="login-btn" class="btn-primary" onclick="doLogin()">Entrar</button>
    <p class="login-footer"><a href="https://bononi-hub.vercel.app">↩ Portal Bononi</a></p>
  </div>
</div>

<!-- ══════════ APP ══════════ -->
<div id="app-screen">

  <!-- Topbar -->
  <div class="topbar">
    <span class="topbar-logo">❄️</span>
    <span class="topbar-title">Stonni Atacado</span>
    <div class="topbar-period">
      <select id="period-select" onchange="applyPeriod(this.value)"></select>
    </div>
    <div class="topbar-right">
      <span id="usuario-nome" class="topbar-user"></span>
      <a href="https://bononi-hub.vercel.app" class="topbar-link">↩ Hub</a>
      <button class="btn-logout" onclick="doLogout()">Sair</button>
    </div>
  </div>

  <!-- Body: sidebar + conteúdo -->
  <div class="app-body">

    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-item" id="nav-home" onclick="switchTab('home')">
        <span class="icon">🏠</span>
        <span class="sidebar-label">Home</span>
      </div>
      <div class="sidebar-item" id="nav-vendedores" onclick="switchTab('vendedores')">
        <span class="icon">👤</span>
        <span class="sidebar-label">Vendedores</span>
      </div>
      <div class="sidebar-item active" id="nav-crm" onclick="switchTab('crm')"
        <span class="icon">💼</span>
        <span class="sidebar-label">CRM</span>
        <span id="crm-badge" class="sidebar-badge hidden">0</span>
      </div>
      <div class="sidebar-item" id="nav-config" onclick="switchTab('config')">
        <span class="icon">⚙️</span>
        <span class="sidebar-label">Configurações</span>
      </div>
    </nav>

    <!-- Páginas -->

    <!-- HOME -->
    <div id="home-page" class="page">
      <div class="page-scroll">
        <div class="empty"><span class="spin">⟳</span> Carregando...</div>
      </div>
    </div>

    <!-- VENDEDORES -->
    <div id="vendedores-page" class="page">
      <div class="page-scroll">
        <div class="empty"><span class="spin">⟳</span> Carregando...</div>
      </div>
    </div>

    <!-- CRM -->
    <div id="crm-page" class="page active">
      <div class="crm-body">

        <!-- Lista esquerda -->
        <div class="crm-list-panel">
          <div class="crm-controls">
            <div class="search-box">
              <span class="icon">🔍</span>
              <input type="text" placeholder="Buscar nome, CNPJ, cidade..."
                     oninput="handleSearch(this.value)"/>
            </div>
            <div class="tabs-row">
              <button id="tab-carteira" class="tab-btn on" onclick="setMainTab('carteira')">Carteira</button>
              <button id="tab-prospeccao" class="tab-btn" onclick="setMainTab('prospeccao')">Prospecção</button>
            </div>

<!-- Supabase + auth carregam ANTES do DOM para doLogin estar disponível no onclick -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
// Aguarda Supabase carregar, depois inicializa
(function waitForSupabase() {
  if (typeof supabase === 'undefined') { setTimeout(waitForSupabase, 50); return; }

  const SUPA_URL = 'https://vishxwdxqiygbxmtpfoy.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpc2h4d2R4cWl5Z2J4bXRwZm95Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0Njg2MjIsImV4cCI6MjA4ODA0NDYyMn0.J647m3ieDHahNQYBWMRESl0aPFXsT_zt_7ZcDvyB-SA';
  window.SUPA_URL = SUPA_URL;
  window.SUPA_KEY = SUPA_KEY;
  window.sb = supabase.createClient(SUPA_URL, SUPA_KEY);

  window.doLogin = async function() {
    const email = document.getElementById('login-email').value.trim();
    const senha = document.getElementById('login-senha').value;
    const btn = document.getElementById('login-btn');
    if (!email || !senha) { showErr('Preencha e-mail e senha'); return; }
    btn.textContent = 'Entrando...'; btn.disabled = true;
    document.getElementById('login-error').style.display = 'none';
    const { data, error } = await window.sb.auth.signInWithPassword({ email, password: senha });
    btn.textContent = 'Entrar'; btn.disabled = false;
    if (error) { showErr(error.message || 'Erro ao fazer login'); return; }
    const meta = data.user?.user_metadata || {};
    if (!meta.admin && !(meta.modulos || []).includes('atacado')) {
      await window.sb.auth.signOut(); showErr('Sem acesso ao módulo Atacado.'); return;
    }
    iniciarApp(data.user);
  };

  window.showErr = function(msg) {
    const el = document.getElementById('login-error');
    el.textContent = msg; el.style.display = 'block';
  };

  window.doLogout = async function() { await window.sb.auth.signOut(); location.reload(); };

  window.iniciarApp = function(user) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').classList.add('visible');
    const el = document.getElementById('usuario-nome');
    if (el) el.textContent = user?.user_metadata?.nome || user?.email || '';
    // Inicia o CRM — se crm.js ainda não carregou, aguarda
    function tryInit() {
      if (window.CRMModule) { window.CRMModule.init(); }
      else { setTimeout(tryInit, 80); }
    }
    tryInit();
  };

  // Verifica sessão existente ao carregar
  window.sb.auth.getSession().then(({ data: { session } }) => {
    if (!session) return;
    const meta = session.user?.user_metadata || {};
    if (!meta.admin && !(meta.modulos || []).includes('atacado')) { window.sb.auth.signOut(); return; }
    iniciarApp(session.user);
  });

})();
</script>
