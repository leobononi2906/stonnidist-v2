<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stonni Atacado</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background:#0f172a; color:#e2e8f0; font-family:Inter,system-ui,sans-serif; }
    * { box-sizing:border-box; }
    ::-webkit-scrollbar { width:4px; height:4px; }
    ::-webkit-scrollbar-track { background:#1e293b; }
    ::-webkit-scrollbar-thumb { background:#475569; border-radius:2px; }
    #crm-drawer { transition:transform 0.25s ease; }
    .animate-spin { animation:spin 1s linear infinite; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    .tab-active {}
  </style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
  <div class="bg-slate-800 border border-slate-700 rounded-2xl p-8 w-full max-w-sm shadow-2xl">
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">❄️</div>
      <h1 class="text-xl font-bold text-slate-100">Stonni Atacado</h1>
      <p class="text-sm text-slate-400 mt-1">Dashboard & CRM de Distribuição</p>
    </div>
    <div class="space-y-4">
      <input id="login-email" type="email" placeholder="E-mail"
        class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2.5 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500"
        autocomplete="email" />
      <input id="login-senha" type="password" placeholder="Senha"
        class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2.5 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500"
        autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()" />
      <div id="login-error" class="hidden text-xs text-red-400 bg-red-500/10 border border-red-500/20 rounded px-3 py-2"></div>
      <button id="login-btn" onclick="doLogin()"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition-colors text-sm">
        Entrar
      </button>
    </div>
    <p class="text-center text-xs text-slate-500 mt-6">
      <a href="https://bononi-hub.vercel.app" class="hover:text-slate-300">↩ Portal Bononi</a>
    </p>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app-screen" class="hidden min-h-screen flex flex-col">

  <!-- TOPBAR -->
  <header class="h-14 sticky top-0 z-30 bg-slate-900 border-b border-slate-700 flex items-center px-4 gap-3 shrink-0">
    <span class="text-xl">❄️</span>
    <h1 class="text-sm font-bold text-slate-100">Stonni Atacado</h1>

    <!-- Filtro de período (apenas Home/Vendedores) -->
    <div id="period-filter" class="ml-4 flex items-center gap-2">
      <select id="period-select" onchange="applyPeriod(this.value)"
        class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-1.5 text-xs text-slate-300 focus:outline-none focus:border-blue-500">
      </select>
    </div>

    <div class="ml-auto flex items-center gap-3">
      <span id="usuario-nome" class="text-xs text-slate-400 hidden sm:block"></span>
      <a href="https://bononi-hub.vercel.app" class="text-xs text-slate-500 hover:text-slate-300 hidden sm:block">↩ Hub</a>
      <button onclick="doLogout()" class="text-xs text-slate-500 hover:text-slate-300 border border-slate-700 hover:border-slate-600 px-2.5 py-1 rounded transition-colors">Sair</button>
    </div>
  </header>

  <!-- NAV TABS -->
  <nav class="bg-slate-900 border-b border-slate-700 px-4 flex gap-1 shrink-0">
    <button data-tab="home" onclick="switchTab('home')"
      class="tab-active bg-slate-700 text-slate-100 px-4 py-2.5 text-sm font-medium rounded-t border-b-2 border-transparent hover:text-slate-200 transition-colors">
      🏠 Home
    </button>
    <button data-tab="vendedores" onclick="switchTab('vendedores')"
      class="text-slate-400 px-4 py-2.5 text-sm font-medium rounded-t hover:text-slate-200 transition-colors">
      👤 Vendedores
    </button>
    <button data-tab="crm" onclick="switchTab('crm')"
      class="text-slate-400 px-4 py-2.5 text-sm font-medium rounded-t hover:text-slate-200 transition-colors">
      💼 CRM
    </button>
    <button data-tab="config" onclick="switchTab('config')"
      class="text-slate-400 px-4 py-2.5 text-sm font-medium rounded-t hover:text-slate-200 transition-colors">
      ⚙️ Config
    </button>
  </nav>

  <!-- CONTEÚDO -->
  <div class="flex-1 overflow-hidden relative">

    <!-- HOME -->
    <div id="home-page" class="h-full overflow-y-auto px-4 py-4">
      <div class="flex items-center justify-center h-32 text-slate-400">
        <div class="text-center"><div class="animate-spin text-xl mb-2">⟳</div><p class="text-sm">Carregando...</p></div>
      </div>
    </div>

    <!-- VENDEDORES -->
    <div id="vendedores-page" class="hidden h-full overflow-y-auto px-4 py-4"></div>

    <!-- CRM — layout duas colunas -->
    <div id="crm-page" class="hidden h-full flex overflow-hidden">

      <!-- Lista (esquerda) -->
      <div class="flex flex-col bg-slate-800/50 border-r border-slate-700 overflow-hidden"
           style="width:clamp(300px,38%,460px);flex-shrink:0;">

        <!-- Controles -->
        <div class="p-3 border-b border-slate-700 space-y-2.5">
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500">🔍</span>
            <input type="text" placeholder="Buscar nome, CNPJ, cidade..."
              oninput="handleSearch(this.value)"
              class="w-full bg-slate-700 border border-slate-600 rounded-lg pl-8 pr-3 py-2 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500" />
          </div>
          <div class="flex gap-1.5">
            <button id="tab-carteira" onclick="setMainTab('carteira')"
              class="rounded-md px-3 py-1.5 text-xs font-semibold bg-blue-600 text-white transition-colors">Carteira</button>
            <button id="tab-prospeccao" onclick="setMainTab('prospeccao')"
              class="rounded-md px-3 py-1.5 text-xs font-semibold text-slate-400 hover:text-slate-200 hover:bg-slate-700 transition-colors">Prospecção</button>
          </div>
          <div id="cart-controls" class="flex gap-1 flex-wrap">
            <button data-subflt="todos" onclick="setSubFilter('todos')" class="rounded-md px-2.5 py-1 text-xs font-medium bg-blue-500/20 text-blue-400">Todos</button>
            <button data-subflt="ativo" onclick="setSubFilter('ativo')" class="rounded-md px-2.5 py-1 text-xs font-medium text-slate-400 hover:text-slate-200">Ativo</button>
            <button data-subflt="atencao" onclick="setSubFilter('atencao')" class="rounded-md px-2.5 py-1 text-xs font-medium text-slate-400 hover:text-slate-200">Atenção</button>
            <button data-subflt="em_risco" onclick="setSubFilter('em_risco')" class="rounded-md px-2.5 py-1 text-xs font-medium text-slate-400 hover:text-slate-200">Em Risco</button>
          </div>
          <div id="prosp-controls" style="display:none" class="flex items-center justify-between gap-2">
            <div class="flex gap-1">
              <button onclick="setProspSub('todos')" class="rounded-md px-2.5 py-1 text-xs font-medium bg-blue-500/20 text-blue-400">Todos</button>
              <button onclick="setProspSub('atencao')" class="rounded-md px-2.5 py-1 text-xs font-medium text-slate-400 hover:text-slate-200">Atenção</button>
            </div>
            <select onchange="setProspSort(this.value)"
              class="bg-slate-700 border border-slate-600 rounded text-xs text-slate-300 px-2 py-1 focus:outline-none">
              <option value="nome_az">Nome A-Z</option>
              <option value="mais_antigo">Mais antigo</option>
              <option value="vendedor_az">Vendedor A-Z</option>
            </select>
          </div>
        </div>

        <!-- Painel de hoje -->
        <div id="today-panel" class="px-3 pt-3"></div>

        <!-- Umbler pendentes -->
        <div id="umbler-pendentes" class="px-3 pt-1"></div>

        <!-- Lista de clientes -->
        <div id="crm-lista" class="flex-1 overflow-y-auto">
          <div class="flex items-center justify-center h-24 text-slate-400">
            <div class="animate-spin text-xl">⟳</div>
          </div>
        </div>
      </div>

      <!-- Drawer / painel direito -->
      <div class="flex-1 flex flex-col overflow-hidden relative">
        <div id="drawer-placeholder" class="flex-1 flex items-center justify-center text-slate-600">
          <div class="text-center">
            <div class="text-5xl mb-3 opacity-20">👥</div>
            <p class="text-sm">Selecione um cliente</p>
          </div>
        </div>

        <div id="crm-drawer"
          class="absolute inset-0 bg-slate-800 border-l border-slate-700 flex flex-col translate-x-full z-10">
          <div class="flex items-center gap-3 px-5 py-3.5 border-b border-slate-700 shrink-0">
            <button onclick="closeDrawer()" class="text-slate-400 hover:text-slate-100 text-lg">←</button>
            <span class="text-sm font-semibold text-slate-200 truncate flex-1" id="drawer-titulo">Ficha</span>
            <a id="drawer-whatsapp" href="#" target="_blank"
              class="hidden text-xs bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-1.5 rounded-lg font-medium">💬 WhatsApp</a>
          </div>
          <div id="drawer-content" class="flex-1 overflow-y-auto px-5 py-4 space-y-5"></div>
        </div>
      </div>
    </div>

    <!-- CONFIG -->
    <div id="config-page" class="hidden h-full overflow-y-auto px-4 py-4"></div>
  </div>
</div>

<!-- ══ MODAL VINCULAR ══ -->
<div id="modal-vincular" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
  <div class="bg-slate-800 border border-slate-700 rounded-xl w-full max-w-md shadow-2xl">
    <div class="flex items-center justify-between p-5 border-b border-slate-700">
      <h3 class="text-sm font-bold text-slate-100">Vincular a um Cliente</h3>
      <button onclick="closeVincularModal()" class="text-slate-400 hover:text-slate-100 text-lg">✕</button>
    </div>
    <div class="p-5 space-y-3">
      <input id="vincular-search" type="text" placeholder="Buscar por nome, CNPJ, cidade..."
        oninput="searchVincular()"
        class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500" />
      <div id="vincular-results" class="max-h-64 overflow-y-auto">
        <p class="text-xs text-slate-500 text-center py-4">Digite para buscar...</p>
      </div>
    </div>
  </div>
</div>

<!-- ══ SCRIPTS ══ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPA_URL = 'https://vishxwdxqiygbxmtpfoy.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpc2h4d2R4cWl5Z2J4bXRwZm95Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0Njg2MjIsImV4cCI6MjA4ODA0NDYyMn0.J647m3ieDHahNQYBWMRESl0aPFXsT_zt_7ZcDvyB-SA';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const senha = document.getElementById('login-senha').value;
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  if (!email || !senha) { showErr('Preencha e-mail e senha'); return; }
  btn.textContent='Entrando...'; btn.disabled=true; errEl.classList.add('hidden');
  const { data, error } = await sb.auth.signInWithPassword({ email, password:senha });
  btn.textContent='Entrar'; btn.disabled=false;
  if (error) { showErr(error.message||'Erro ao fazer login'); return; }
  const meta = data.user?.user_metadata||{};
  if (!meta.admin && !(meta.modulos||[]).includes('atacado')) {
    await sb.auth.signOut(); showErr('Sem acesso ao módulo Atacado.'); return;
  }
  iniciarApp(data.user);
}
function showErr(msg) { const el=document.getElementById('login-error'); el.textContent=msg; el.classList.remove('hidden'); }
async function doLogout() { await sb.auth.signOut(); location.reload(); }
async function verificarSessao() {
  const { data:{session} } = await sb.auth.getSession();
  if (!session) { mostrarLogin(); return; }
  const meta=session.user?.user_metadata||{};
  if (!meta.admin && !(meta.modulos||[]).includes('atacado')) { await sb.auth.signOut(); mostrarLogin(); return; }
  iniciarApp(session.user);
}
function mostrarLogin() {
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app-screen').classList.add('hidden');
}
function iniciarApp(user) {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app-screen').classList.remove('hidden');
  const nome = user?.user_metadata?.nome||user?.email||'';
  const el = document.getElementById('usuario-nome');
  if(el) el.textContent = nome;
  if (window.CRMModule) window.CRMModule.init();
}
verificarSessao();
</script>
<script src="crm.js?v=20260606b"></script>
</body>
</html>
