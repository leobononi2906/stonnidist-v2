<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stonni Atacado — CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background: '#0f172a',
            card: '#1e293b',
            border: '#334155',
          }
        }
      }
    };
  </script>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: Inter, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }
    #crm-drawer { transition: transform 0.3s ease; }
    .animate-spin { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════
     TELA DE LOGIN
══════════════════════════════════════ -->
<div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
  <div class="bg-slate-800 border border-slate-700 rounded-2xl p-8 w-full max-w-sm shadow-2xl">
    <div class="text-center mb-8">
      <div class="text-4xl mb-3">❄️</div>
      <h1 class="text-xl font-bold text-slate-100">Stonni Atacado</h1>
      <p class="text-sm text-slate-400 mt-1">CRM de Distribuição</p>
    </div>
    <div class="space-y-4">
      <div>
        <label class="text-xs text-slate-400 block mb-1">E-mail</label>
        <input id="login-email" type="email" placeholder="seu@email.com"
          class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2.5 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500"
          autocomplete="email" />
      </div>
      <div>
        <label class="text-xs text-slate-400 block mb-1">Senha</label>
        <input id="login-senha" type="password" placeholder="••••••••"
          class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2.5 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500"
          autocomplete="current-password"
          onkeydown="if(event.key==='Enter') doLogin()" />
      </div>
      <div id="login-error" class="hidden text-xs text-red-400 bg-red-500/10 border border-red-500/20 rounded px-3 py-2"></div>
      <button id="login-btn" onclick="doLogin()"
        class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold py-2.5 rounded-lg transition-colors text-sm">
        Entrar
      </button>
    </div>
    <p class="text-center text-xs text-slate-500 mt-6">
      <a href="https://bononi-hub.vercel.app" class="hover:text-slate-300 transition-colors">↩ Portal Bononi</a>
    </p>
  </div>
</div>

<!-- ══════════════════════════════════════
     APP PRINCIPAL
══════════════════════════════════════ -->
<div id="app-screen" class="hidden min-h-screen flex flex-col">

  <!-- TOPBAR -->
  <header class="h-14 sticky top-0 z-30 bg-slate-900 border-b border-slate-700 flex items-center px-4 gap-3 shrink-0">
    <div class="text-xl">❄️</div>
    <div class="min-w-0 flex-1">
      <h1 class="text-sm font-bold text-slate-100 leading-tight">Stonni Atacado</h1>
      <p class="text-[10px] text-slate-500 leading-tight">CRM — Carteira e Prospecção</p>
    </div>
    <div class="flex items-center gap-3 shrink-0">
      <span id="usuario-nome" class="text-xs text-slate-400 hidden sm:block"></span>
      <button onclick="doLogout()"
        class="text-xs text-slate-500 hover:text-slate-300 border border-slate-700 hover:border-slate-600 px-2.5 py-1 rounded transition-colors">
        Sair
      </button>
    </div>
  </header>

  <!-- MAIN LAYOUT: lista + drawer -->
  <div class="flex-1 flex overflow-hidden">

    <!-- ── PAINEL ESQUERDO (lista) ── -->
    <div class="flex flex-col bg-slate-800/50 border-r border-slate-700 overflow-hidden"
         style="width: clamp(320px, 38%, 480px); min-width: 300px; flex-shrink: 0;">

      <!-- CONTROLES DO TOPO -->
      <div class="p-3 border-b border-slate-700 space-y-2.5">

        <!-- Barra de busca -->
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm">🔍</span>
          <input type="text" placeholder="Buscar nome, CNPJ, cidade..."
            oninput="handleSearch(this.value)"
            class="w-full bg-slate-700 border border-slate-600 rounded-lg pl-8 pr-3 py-2 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500" />
        </div>

        <!-- Tabs principais -->
        <div class="flex gap-1.5">
          <button id="tab-carteira" onclick="setMainTab('carteira')"
            class="rounded-md px-3 py-1.5 text-xs font-semibold transition-colors bg-blue-600 text-white">
            Carteira
          </button>
          <button id="tab-prospeccao" onclick="setMainTab('prospeccao')"
            class="rounded-md px-3 py-1.5 text-xs font-semibold transition-colors text-slate-400 hover:text-slate-200 hover:bg-slate-700">
            Prospecção
          </button>
        </div>

        <!-- Subfiltros Carteira -->
        <div id="cart-controls" class="flex gap-1 flex-wrap">
          <button data-subflt="todos" onclick="setSubFilter('todos')"
            class="rounded-md px-2.5 py-1 text-xs font-medium transition-colors bg-blue-500/20 text-blue-400">Todos</button>
          <button data-subflt="ativo" onclick="setSubFilter('ativo')"
            class="rounded-md px-2.5 py-1 text-xs font-medium transition-colors text-slate-400 hover:text-slate-200">Ativo</button>
          <button data-subflt="atencao" onclick="setSubFilter('atencao')"
            class="rounded-md px-2.5 py-1 text-xs font-medium transition-colors text-slate-400 hover:text-slate-200">Atenção</button>
          <button data-subflt="em_risco" onclick="setSubFilter('em_risco')"
            class="rounded-md px-2.5 py-1 text-xs font-medium transition-colors text-slate-400 hover:text-slate-200">Em Risco</button>
        </div>

        <!-- Controles Prospecção -->
        <div id="prosp-controls" style="display:none" class="space-y-2">
          <div class="flex gap-1.5 items-center justify-between">
            <div class="flex gap-1">
              <button onclick="setProspSub('todos')"
                class="rounded-md px-2.5 py-1 text-xs font-medium bg-blue-500/20 text-blue-400">Todos</button>
              <button onclick="setProspSub('atencao')"
                class="rounded-md px-2.5 py-1 text-xs font-medium text-slate-400 hover:text-slate-200">Atenção</button>
            </div>
            <select onchange="setProspSort(this.value)"
              class="bg-slate-700 border border-slate-600 rounded text-xs text-slate-300 px-2 py-1">
              <option value="nome_az">Nome A-Z</option>
              <option value="mais_antigo">Mais antigo</option>
              <option value="vendedor_az">Vendedor A-Z</option>
            </select>
          </div>
        </div>
      </div>

      <!-- HOJE panel -->
      <div id="today-panel" class="px-3 pt-3"></div>

      <!-- UMBLER pendentes -->
      <div id="umbler-pendentes" class="px-3 pt-2"></div>

      <!-- LISTA de clientes -->
      <div id="crm-lista" class="flex-1 overflow-y-auto">
        <div class="flex items-center justify-center h-32 text-slate-500">
          <div class="text-center"><div class="animate-spin text-xl mb-2">⟳</div><p class="text-sm">Carregando...</p></div>
        </div>
      </div>
    </div>

    <!-- ── PAINEL DIREITO (drawer fixo em desktop) ── -->
    <div class="flex-1 flex flex-col overflow-hidden relative">

      <!-- Placeholder quando nada selecionado -->
      <div id="drawer-placeholder" class="flex-1 flex items-center justify-center text-slate-600">
        <div class="text-center">
          <div class="text-4xl mb-3 opacity-30">👥</div>
          <p class="text-sm">Selecione um cliente para ver detalhes</p>
        </div>
      </div>

      <!-- Drawer deslizante (mobile) / painel fixo (desktop) -->
      <div id="crm-drawer"
        class="fixed sm:absolute inset-y-0 right-0 w-full sm:w-full bg-slate-800 border-l border-slate-700 flex flex-col translate-x-full sm:translate-x-full z-20"
        style="top: 56px;">

        <!-- Cabeçalho do drawer -->
        <div class="flex items-center gap-3 px-5 py-3.5 border-b border-slate-700 shrink-0">
          <button onclick="closeDrawer()"
            class="text-slate-400 hover:text-slate-100 transition-colors text-lg leading-none">←</button>
          <span class="text-sm font-semibold text-slate-200" id="drawer-titulo">Ficha do Cliente</span>
          <div class="ml-auto flex items-center gap-2">
            <a id="drawer-whatsapp" href="#" target="_blank"
              class="hidden text-xs bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-1.5 rounded-lg font-medium transition-colors">
              💬 WhatsApp
            </a>
          </div>
        </div>

        <!-- Conteúdo rolável -->
        <div id="drawer-content" class="flex-1 overflow-y-auto px-5 py-4 space-y-5">
          <!-- preenchido por crm.js -->
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     MODAL: VINCULAR CLIENTE
══════════════════════════════════════ -->
<div id="modal-vincular" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
  <div class="bg-slate-800 border border-slate-700 rounded-xl w-full max-w-md shadow-2xl">
    <div class="flex items-center justify-between p-5 border-b border-slate-700">
      <h3 class="text-sm font-bold text-slate-100">Vincular a um Cliente</h3>
      <button onclick="closeVincularModal()" class="text-slate-400 hover:text-slate-100 text-lg">✕</button>
    </div>
    <div class="p-5 space-y-3">
      <div class="flex gap-2">
        <input id="vincular-search" type="text" placeholder="Buscar por nome, CNPJ, cidade..."
          oninput="searchVincular()"
          class="flex-1 bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500" />
      </div>
      <div id="vincular-results" class="max-h-64 overflow-y-auto space-y-1">
        <p class="text-xs text-slate-500 text-center py-4">Digite para buscar...</p>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     SCRIPTS
══════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  const SUPA_URL = 'https://vishxwdxqiygbxmtpfoy.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpc2h4d2R4cWl5Z2J4bXRwZm95Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0Njg2MjIsImV4cCI6MjA4ODA0NDYyMn0.J647m3ieDHahNQYBWMRESl0aPFXsT_zt_7ZcDvyB-SA';
  const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

  // ── Auth ──
  async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const senha = document.getElementById('login-senha').value;
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('login-error');

    if (!email || !senha) { showErr('Preencha e-mail e senha'); return; }

    btn.textContent = 'Entrando...'; btn.disabled = true;
    errEl.classList.add('hidden');

    const { data, error } = await sb.auth.signInWithPassword({ email, password: senha });

    btn.textContent = 'Entrar'; btn.disabled = false;

    if (error) { showErr(error.message || 'Erro ao fazer login'); return; }

    const meta = data.user?.user_metadata || {};
    if (!meta.admin && !(meta.modulos || []).includes('atacado')) {
      await sb.auth.signOut();
      showErr('Sem acesso ao módulo Atacado. Contate o administrador.');
      return;
    }

    iniciarApp(data.user);
  }

  function showErr(msg) {
    const el = document.getElementById('login-error');
    el.textContent = msg; el.classList.remove('hidden');
  }

  async function doLogout() {
    await sb.auth.signOut();
    location.reload();
  }

  async function verificarSessao() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { mostrarLogin(); return; }
    const meta = session.user?.user_metadata || {};
    if (!meta.admin && !(meta.modulos || []).includes('atacado')) {
      await sb.auth.signOut(); mostrarLogin(); return;
    }
    iniciarApp(session.user);
  }

  function mostrarLogin() {
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('app-screen').classList.add('hidden');
  }

  function iniciarApp(user) {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app-screen').classList.remove('hidden');
    const nome = user?.user_metadata?.nome || user?.email || '';
    const nomeEl = document.getElementById('usuario-nome');
    if (nomeEl) nomeEl.textContent = nome;

    // iniciar CRM
    if (window.CRMModule) window.CRMModule.init();
  }

  // Auto-verificar ao carregar
  verificarSessao();
</script>

</body>
</html>
